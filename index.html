<style>
/* ============================================================
   DESIGN TOKENS — mobile-first, warm institutional palette
   ============================================================ */
:root{
  --brand:#0c3a5e; --brand-mid:#1e5c8e; --brand-dark:#082a49;
  --brand-light:#e1eff9; --brand-50:#f0f7fd;
  --accent:#c47f17; --accent-dark:#9e6510; --accent-light:#fef5e4;
  --green:#1a6b4a; --green-bg:#e6f4ec;
  --red:#9b1c1c; --red-bg:#fdecea;
  --amber:#8a5c00; --amber-bg:#fdf4e3;
  --bg:#f6f4f0; --surface:#fff;
  --s2:#faf9f7; --border:#e0dbd4;
  --border-s:#c5bcb2; --text:#1a1915;
  --t2:#4a4640; --muted:#8a837b;
  --font:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono','Consolas','Courier New',monospace;
  --r:8px; --r-lg:14px; --r-xl:20px;
  --sh:0 1px 3px rgba(12,58,94,.08),0 1px 2px rgba(12,58,94,.05);
  --sh-md:0 4px 12px rgba(12,58,94,.10),0 2px 4px rgba(12,58,94,.06);
  --sh-lg:0 8px 28px rgba(12,58,94,.12),0 3px 8px rgba(12,58,94,.07);
}

/* ---- Reset & Base ---- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3,h4,h5{line-height:1.25;font-weight:600;color:var(--text)}
p,span,div{line-height:1.55}
a{color:var(--brand);text-decoration:none}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font)}
img{max-width:100%;height:auto}

/* ---- App Shell ---- */
.app{display:flex;flex-direction:column;min-height:100vh}
.app-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)
}
.brand{display:flex;align-items:center;gap:10px;color:var(--text);font-weight:600;font-size:15px}
.brand-mark{
  width:32px;height:32px;background:var(--brand);border-radius:6px;
  display:grid;place-items:center;color:#fff;font-family:var(--mono);
  font-size:11px;font-weight:500;letter-spacing:.02em;flex-shrink:0
}
.brand-mark::before{content:"LQ"}
.brand-name{display:flex;flex-direction:column;gap:0}
.brand-title{font-size:14px;font-weight:600;line-height:1.2}
.brand-sub{font-size:11px;color:var(--muted);font-weight:400}
.header-date{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;display:none}
@media(min-width:600px){.header-date{display:block}}

.main{flex:1;padding:0 0 80px}
.app-footer{
  background:var(--surface);border-top:1px solid var(--border);
  padding:20px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7
}
.app-footer strong{color:var(--t2);font-weight:500}

/* ---- Screens ---- */
.screen{display:none}
.screen.active{display:block;animation:fadeIn 160ms ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ================================================================
   AD SYSTEM — slots activos y placeholders
   ================================================================ */
.ad-slot{
  width:100%;border-radius:var(--r);overflow:hidden;
  display:block;position:relative;text-decoration:none
}
/* Placeholder (slot disponible) */
.ad-ph{
  background:var(--s2);border:1.5px dashed var(--border-s);
  border-radius:var(--r);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
  padding:14px 20px;text-align:center;width:100%;height:100%
}
.ad-ph-icon{font-size:20px;opacity:.45;line-height:1}
.ad-ph-name{font-size:10px;font-family:var(--mono);font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.ad-ph-msg{font-size:12px;color:var(--muted);line-height:1.45;max-width:28ch}
.ad-ph-dims{font-size:10px;font-family:var(--mono);color:var(--border-s);margin-top:2px}
/* Banner activo */
.ad-active{display:block;text-decoration:none;border-radius:var(--r);overflow:hidden;
  transition:opacity 100ms}
.ad-active:hover{opacity:.92}
.ad-active img{display:block;width:100%;height:100%;object-fit:cover;border-radius:var(--r)}
/* Tamaños mínimos por tipo */
.ad-sz-banner{min-height:52px}
.ad-sz-rect{min-height:250px}
.ad-sz-half{min-height:390px}

/* ---- Typography ---- */
.text-sm{font-size:14px}
.text-xs{font-size:12px} .text-muted{color:var(--muted)}
.mono{font-family:var(--mono)}
.fw-600{font-weight:600} .fw-700{font-weight:700}

/* ---- Containers ---- */
.container{max-width:860px;width:100%;margin:0 auto;padding:0 20px}
@media(min-width:600px){.container{padding:0 28px}}

/* ---- Cards ---- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh)}
.card-body{padding:24px 20px}
@media(min-width:600px){.card-body{padding:28px 28px}}

/* ---- Buttons ---- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:var(--r);border:1px solid var(--border-s);
  background:var(--surface);color:var(--text);font-size:15px;font-weight:500;
  font-family:var(--font);line-height:1;transition:background 100ms,border-color 100ms,transform 80ms;
  white-space:nowrap;min-height:46px
}
.btn:hover{background:#f0ede8}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--t2)}
.btn-ghost:hover{background:#f0ede8}
.btn-lg{padding:15px 28px;font-size:16px;min-height:52px;border-radius:var(--r)}
.btn-sm{padding:8px 14px;font-size:13px;min-height:38px}
.btn-block{width:100%}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:#f8c8c8}

/* ---- Form ---- */
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:13px;font-weight:500;color:var(--t2)}
.field-hint{font-size:12px;color:var(--muted);line-height:1.45}
.field-error{font-size:12px;color:var(--red);font-weight:500;display:none}
.field-error.visible{display:block}
input[type="text"],input[type="number"],input[type="date"],select,textarea{
  font-family:var(--font);font-size:16px;padding:12px 14px;
  border:1.5px solid var(--border-s);border-radius:var(--r);
  background:var(--surface);color:var(--text);width:100%;
  transition:border-color 120ms,box-shadow 120ms;
  -webkit-appearance:none;appearance:none
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(12,58,94,.14)
}
input[inputmode="decimal"]{font-family:var(--mono)}
input.err,select.err{border-color:var(--red)}
.form-grid{display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:600px){.form-grid{grid-template-columns:repeat(2,1fr)}}
.form-grid .full{grid-column:1/-1}
.radio-group{display:flex;flex-wrap:wrap;gap:10px}
.radio-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 14px;border:1.5px solid var(--border-s);border-radius:var(--r);
  cursor:pointer;font-size:14px;color:var(--t2);transition:border-color 100ms,background 100ms;
  min-height:44px
}
.radio-btn:has(input:checked){background:var(--brand-50);border-color:var(--brand);color:var(--brand)}
.radio-btn input{accent-color:var(--brand);margin:0;width:16px;height:16px}
.checkbox-row{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  font-size:14px;color:var(--t2);padding:10px 0
}
.checkbox-row input{accent-color:var(--brand);width:18px;height:18px;flex-shrink:0}

/* concept rows */
.concept-row{display:grid;grid-template-columns:2fr 1fr auto;gap:8px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--border)}
.concept-row:last-child{border-bottom:none}
@media(max-width:480px){.concept-row{grid-template-columns:1fr auto;gap:6px}
.concept-row .concept-amount{grid-row:1;grid-column:2}
.concept-row .concept-name{grid-column:1/-1}}

/* month grid for variable salary */
.month-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:480px){.month-grid{grid-template-columns:repeat(3,1fr)}}
.month-grid .field-label{font-size:11px;color:var(--muted);margin-bottom:3px}

/* ---- Info box ---- */


/* ---- Disclaimer ---- */

.band{border-radius:var(--r);padding:16px 18px;border:1px solid;display:flex;gap:14px;align-items:flex-start}
.band-mark{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.55);flex-shrink:0;white-space:nowrap}
.band-title{font-weight:600;font-size:15px;margin-bottom:3px}
.band-body{font-size:13px;line-height:1.5}
.band-t{background:var(--green-bg);border-color:#a8d9bf;color:var(--green)}
.band-p{background:var(--brand-light);border-color:#b3cde0;color:var(--brand-mid)}
.band-s{background:var(--amber-bg);border-color:#e8c36a;color:var(--amber)}
.band-a{background:var(--red-bg);border-color:#f0b8b8;color:var(--red)}
.disclaimer{
  background:var(--amber-bg);border:1px solid #e8c36a;border-left:4px solid var(--accent);
  border-radius:var(--r);padding:12px 16px;font-size:13px;color:var(--amber);line-height:1.5
}
.disclaimer strong{font-weight:600;color:#6b4500}

/* ---- Bands/Alerts ---- */
.alert-list{display:flex;flex-direction:column;gap:10px}
.alert-item{
  border:1px solid var(--border);border-left:3px solid var(--accent);
  background:var(--surface);padding:12px 14px;border-radius:var(--r);font-size:14px;line-height:1.5
}
.alert-item.critical{border-left-color:var(--red);background:var(--red-bg)}
.alert-item.info{border-left-color:var(--brand);background:var(--brand-50)}
.alert-tag{
  display:inline-block;font-family:var(--mono);font-size:10px;text-transform:uppercase;
  letter-spacing:.08em;font-weight:600;margin-bottom:4px;color:var(--amber)
}
.alert-item.critical .alert-tag{color:var(--red)}
.alert-item.info .alert-tag{color:var(--brand)}

/* ---- Difference bands ---- */


/* ---- Tables ---- */
table.data{width:100%;border-collapse:collapse;font-size:14px}
table.data th,table.data td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top}
table.data thead th{background:var(--s2);font-weight:600;font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border-s)}
table.data tr:last-child td{border-bottom:none}
table.data td.num,table.data th.num{text-align:right;font-family:var(--mono);white-space:nowrap;font-variant-numeric:tabular-nums}
table.data tr.total td{font-weight:600;background:var(--s2);border-top:2px solid var(--border-s)}
table.data tr.pos td.diff{color:var(--green)}
table.data tr.neg td.diff{color:var(--red)}

/* ---- Pills ---- */
.pill{
  display:inline-flex;align-items:center;font-family:var(--mono);font-size:11px;

.pill-amber{background:var(--accent-light);color:var(--accent-dark);border-color:#e8c36a}

.pill-red{background:var(--red-bg);color:var(--red);border-color:#f0b8b8}

.divider{height:1px;background:var(--border);margin:20px 0}

.stack{display:flex;flex-direction:column}
.gap-4{gap:4px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.gap-20{gap:20px}.gap-24{gap:24px}

.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}

<script id="ads-js">
/*
 * ADS_CONFIG — Inventario de los 6 espacios publicitarios de Liquia.
 *
 * Para activar un espacio:
 *   1. Cambiar activo: true
 *   2. Poner la URL pública de la imagen en 'imagen'

const ADS_CONFIG = {

    nombre   : "Landing Superior",

};

/*
 * renderAd(id) — devuelve el HTML del slot según su configuración.
 * Si activo:true y hay imagen+link → muestra el banner clickeable.
 * Si no → muestra el placeholder de disponible.
 */
function renderAd(id) {
  const cfg = ADS_CONFIG[id];
  if (!cfg) return '';

  const szClass = { banner:'ad-sz-banner', rect:'ad-sz-rect', half:'ad-sz-half' }[cfg.tamaño] || 'ad-sz-banner';

  if (cfg.activo && cfg.imagen && cfg.link) {
    // ── Banner activo: imagen clickeable ─────────────────────────
    return `<a href="${escHtml(cfg.link)}"
               target="_blank"
               rel="noopener sponsored"
               class="ad-slot ad-active ${szClass}"
               id="${id}"
               aria-label="${escHtml(cfg.alt || cfg.nombre)}">
              <img src="${escHtml(cfg.imagen)}"
                   alt="${escHtml(cfg.alt || cfg.nombre)}"
                   loading="lazy"/>
            </a>`;
  }

  // ── Placeholder: espacio disponible ──────────────────────────
  return `<div class="ad-slot ${szClass}" id="${id}" aria-label="Espacio publicitario disponible">
            <div class="ad-ph">
              <span class="ad-ph-icon">📢</span>
              <span class="ad-ph-name">${escHtml(cfg.nombre)}</span>
              <span class="ad-ph-msg">Espacio publicitario disponible.<br>Para contratar este espacio, contacta a los administradores.</span>
              <span class="ad-ph-dims">${escHtml(cfg.dims)}</span>
            </div>
          </div>`;
}

<script id="sec-js">
  // Escapa caracteres HTML para prevenir XSS al inyectar texto de usuario en innerHTML
  function escHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
  // Sanitiza un valor numérico: solo dígitos, punto y signo negativo
  function sanitizeNum(val) {
    const n = Number(String(val).replace(/[^0-9.\-]/g, ""));
    return isNaN(n) ? 0 : n;
  }
</script>

<script id="util-js">
  const fmtCOP = (n) => {
    if (n === null || n === undefined || isNaN(n)) return "—";
    const sign = n < 0 ? "-" : "";
    return sign + "$" + Math.round(Math.abs(n)).toLocaleString("es-CO");
  };
  const fmtDate = (d) => {
    if (!d) return "—";
    const dt = (d instanceof Date) ? d : new Date(d + "T00:00:00");
    return isNaN(dt) ? "—" : dt.toLocaleDateString("es-CO", {day:"2-digit",month:"short",year:"numeric"});
  };
  const parseDate = (s) => {
    if (!s) return null;
    const dt = new Date(s + "T00:00:00");
    return isNaN(dt) ? null : dt;
  };
  function diasComerciales(fi, ff) {
    const d1 = (fi instanceof Date) ? fi : parseDate(fi);
    const d2 = (ff instanceof Date) ? ff : parseDate(ff);
    if (!d1 || !d2) return 0;
    let y1=d1.getFullYear(), m1=d1.getMonth()+1, day1=d1.getDate();
    let y2=d2.getFullYear(), m2=d2.getMonth()+1, day2=d2.getDate();
    if (day1===31) day1=30;
    if (day2===31) day2=30;
    return (y2-y1)*360 + (m2-m1)*30 + (day2-day1) + 1;
  }
  function diasCalendario(fi, ff) {
    const d1 = (fi instanceof Date) ? fi : parseDate(fi);
    const d2 = (ff instanceof Date) ? ff : parseDate(ff);
    if (!d1 || !d2) return 0;
    return Math.round((d2-d1)/86400000) + 1;
  }
  function inicioSemestreActual(ff) {
    const d = (ff instanceof Date) ? ff : parseDate(ff);
    if (!d) return null;
    return d.getMonth() < 6 ? new Date(d.getFullYear(),0,1) : new Date(d.getFullYear(),6,1);
  }
  function inicioAnioActual(ff) {
    const d = (ff instanceof Date) ? ff : parseDate(ff);
    return d ? new Date(d.getFullYear(),0,1) : null;
  }
  function aniosYDias(dc) {
    return { anios: Math.floor(dc/360), diasFraccion: dc - Math.floor(dc/360)*360 };
  }
  function uid() {
    return "LQ-" + Math.random().toString(36).slice(2,8).toUpperCase() + "-" + Date.now().toString(36).slice(-4).toUpperCase();
  }
  const todayStr = () => HOY.toISOString().slice(0,10);
  function tiempoHumano(dc) {
    const a = Math.floor(dc/360), d = dc - a*360, m = Math.floor(d/30), ds = d - m*30;
    let out = [];
    if (a>0) out.push(a+"a");
    if (m>0) out.push(m+"m");
    if (ds>0 && a===0) out.push(ds+"d");
    return out.join(" ") || "0d";
  }
</script>

<!-- ============================================================
     CALCULATION ENGINE  (all v1.1 fixes applied)

<script id="calc-js">
  function aplicaAuxilio(d, baseSinAux) {
    if (d.tipoSalario==="integral") return false;
    if (d.auxTransporteModo==="si") return true;
    if (d.auxTransporteModo==="no") return false;
    return baseSinAux <= TOPE_AUX_TRANSPORTE;
  }
  function labelAux(d) { return d.modalidadLaboral==="teletrabajo" ? "Auxilio de conectividad" : "Auxilio de transporte"; }
  function refAux(d)   { return d.modalidadLaboral==="teletrabajo" ? "Ley 2466/2025 · Art. 7 Ley 1/1963" : "Ley 15/1959 · Art. 7 Ley 1/1963"; }

  function salBase(d) {
    let sm = 0;
    if (d.tipoSalario==="fijo") sm = Number(d.salarioFijo)||0;
    else if (d.tipoSalario==="variable") {
      if (d.modoVariable==="promedio") sm = Number(d.promedioVariable)||0;
      else {
        const filled = (d.mensualidades||[]).filter(m => m!==""&&m!==null&&m!==undefined);
        sm = filled.length ? filled.reduce((a,m)=>a+(Number(m)||0),0)/filled.length : 0;
      }
    } else { sm = Number(d.salarioIntegral)||0; }
    const concSal = (d.conceptos||[]).filter(c=>c.salarial).reduce((s,c)=>s+(Number(c.monto)||0),0);
    const baseSinAux = sm + concSal;
    const aplica = aplicaAuxilio(d, baseSinAux);
    const aux = aplica ? AUX_TRANSPORTE_2026 : 0;
    return {
      salMensual: sm, concSal, baseSinAux, aplica, tipoAux: labelAux(d), refAux: refAux(d),
      auxMensual: aux, baseConAux: baseSinAux + aux,
      baseVac: baseSinAux,
      baseIntVac: d.tipoSalario==="integral" ? sm/1.30 : null
    };
  }

  function calcCesantias(base, dias, tipo) {
    if (tipo==="integral") return {v:0, aplica:false, nota:"No aplica en salario integral."};
    return {v:(base*dias)/360, aplica:true};
  }
  function calcIntereses(ces, dias, tipo) {
    if (tipo==="integral") return {v:0, aplica:false};
    return {v:(ces*dias*TASA_INTERES_CESANTIAS)/360, aplica:true};
  }
  function calcPrima(base, diasSem, tipo) {
    if (tipo==="integral") return {v:0, aplica:false, nota:"No aplica en salario integral."};
    return {v:(base*diasSem)/360, aplica:true};
  }
  function calcVacaciones(salSinAux, dias, disf, pendAnt, tipo, baseIntVac) {
    const base = tipo==="integral" ? baseIntVac : salSinAux;
    const causados = (15*dias)/360;
    const netos = causados - Number(disf||0) + Number(pendAnt||0);
    return {v:(base/30)*Math.max(0,netos), aplica:true, causados, netos};
  }
  function calcIndem(d, salDiario, salMensConAux) {
    const {motivoTerminacion:mot, tipoContrato:tc, fechaIngreso:fi, fechaTerminacion:ff, periodoPrueba:pp} = d;
    if (pp) return {v:0, aplica:false, nota:"Periodo de prueba: sin indemnización (Art. 80 CST)."};
    if (mot!=="despido_sin_justa") return {v:0, aplica:false, nota:"Solo aplica en despido sin justa causa (Art. 64 CST)."};
    const dias = diasComerciales(fi, ff);
    const {anios, diasFraccion} = aniosYDias(dias);
    const frac = diasFraccion/360;
    const alto = salMensConAux >= 10*SMMLV_2026;
    if (tc==="indefinido") {
      let nd;
      if (anios<1) {
        nd = alto ? Math.max(20, 20*(anios+frac)) : Math.max(30, 30*(anios+frac));
      } else {
        nd = alto ? 20+(15*(anios-1))+(15*frac) : 30+(20*(anios-1))+(20*frac);
      }
      return {v:salDiario*nd, aplica:true, dias:nd, regla:alto?"alto":"bajo"};
    }
    if (tc==="fijo") return {v:0, aplica:true, nota:"Contrato a término fijo: ingresa el monto correspondiente en la sección de empresa (Art. 64 CST)."};
    if (tc==="obra") return {v:salDiario*15, aplica:true, nota:"Mínimo 15 días de salario (Art. 64 CST)."};
    return {v:0, aplica:false};
  }

  function calcularLiquidacion(d) {
    const f1 = parseDate(d.fechaIngreso), f2 = parseDate(d.fechaTerminacion);
    if (!f1||!f2) return {errors:["Ingresa fechas de ingreso y terminación válidas."]};
    if (f2<f1) return {errors:["La fecha de terminación debe ser posterior a la de ingreso."]};
    const dias = diasComerciales(f1, f2);
    const diasCal = diasCalendario(f1, f2);
    const base = salBase(d);
    // Prima: días del semestre actual
    const iniSem = inicioSemestreActual(f2);
    const refSem = f1>iniSem ? f1 : iniSem;
    const diasSem = diasComerciales(refSem, f2);
    // Cesantías: si consignadas o parcial → solo año actual
    let diasCes = dias;
    const cesAnt = d.cesantiasAnterioresConsignadas;
    if (cesAnt==="si"||cesAnt==="parcial") {
      const iniAnio = inicioAnioActual(f2);
      const refAnio = f1>iniAnio ? f1 : iniAnio;
      diasCes = diasComerciales(refAnio, f2);
    }
    const bc = base.baseConAux;
    const cesR = calcCesantias(bc, diasCes, d.tipoSalario);
    const intR = calcIntereses(cesR.v, diasCes, d.tipoSalario);
    const priR = calcPrima(bc, diasSem, d.tipoSalario);
    const primPend = Number(d.primaPendiente||0);
    const vacR = calcVacaciones(base.baseVac, dias, d.diasVacacionesDisfrutadas, d.diasVacacionesPendientesAnt, d.tipoSalario, base.baseIntVac);

    // Salario diario CON auxilio → cesantías, prima, salarios pendientes
    const salDiario = bc/30;
    // Salario diario SIN auxilio → indemnización (Art. 64 CST; el auxilio no es salario — Art. 128 CST)
    // La Ley 1/1963 Art. 7 incluye el auxilio solo para cesantías y prima, no para indemnización
    const salDiarioPuro = base.baseSinAux / 30;
    const indemR = calcIndem(d, salDiarioPuro, bc);
    const diasSalPend = Number(d.diasSalariosPendientes||0);
    const salPend = salDiario * diasSalPend; // salarios pendientes: base con auxilio (Art. 127 CST)
    const extras = Number(d.extrasComisionesPend||0);
    const cesPendAnt = Number(d.cesantiasPendientesAnt||0);
    const lineas = [
      { key:"cesantias",  aplica:cesR.aplica, concepto:"Cesantías",
        formula:"(Base × Días) / 360", vars:`Base: ${fmtCOP(bc)} · Días: ${diasCes}`,
        nota: base.aplica ? `Incluye ${base.tipoAux} en base (${base.refAux})` : undefined,
        ref:"Art. 249 CST · Ley 50/1990", v:cesR.v },
    ];
    if (cesPendAnt>0 && cesAnt==="parcial") lineas.push(
      { key:"cesantias_ant", aplica:true, concepto:"Cesantías pendientes años anteriores",
        formula:"Valor capturado", vars:"Saldo no consignado en fondo",
        ref:"Art. 249 CST", v:cesPendAnt }
    );
    lineas.push(
      { key:"intereses", aplica:intR.aplica, concepto:"Intereses sobre cesantías",
        formula:"(Cesantías × Días × 12%) / 360",
        vars:`Ces: ${fmtCOP(cesR.v)} · Días: ${diasCes} · 12% anual`,
        ref:"Ley 52/1975 · Art. 1", v:intR.v },
      { key:"prima", aplica:priR.aplica, concepto:"Prima de servicios (semestre actual)",
        formula:"(Base × Días semestre) / 360",
        vars:`Base: ${fmtCOP(bc)} · Días semestre: ${diasSem}`,
        nota:priR.nota, ref:"Art. 306 CST · Ley 1788/2016", v:priR.v }
    );
    if (primPend>0) lineas.push(
      { key:"prima_ant", aplica:true, concepto:"Prima pendiente semestre anterior",
        formula:"Valor capturado", vars:"Saldo prima semestre anterior",
        ref:"Art. 306 CST", v:primPend }
    );
    lineas.push(
      { key:"vacaciones", aplica:vacR.aplica, concepto:"Vacaciones compensadas",
        formula:"(Salario/30) × Días netos",
        vars:`Base: ${fmtCOP(d.tipoSalario==="integral"?base.baseIntVac:base.baseVac)} (sin auxilio · Art. 192 CST)\nCausados: ${vacR.causados.toFixed(4)} · Disfrutados: ${d.diasVacacionesDisfrutadas||0} · Pend.ant.: ${d.diasVacacionesPendientesAnt||0} · Netos: ${vacR.netos.toFixed(4)}`,
        ref:"Art. 186 y 189 CST", v:vacR.v },
      { key:"indemnizacion", aplica:indemR.aplica, concepto:"Indemnización por terminación",
        formula: indemR.regla==="bajo" ? "Sal. diario × [30 + 20×(años-1) + 20×fracc.]" :
                 indemR.regla==="alto" ? "Sal. diario × [20 + 15×(años-1) + 15×fracc.]" :
                 indemR.aplica ? "Según tipo de contrato" : "No aplica",
        vars: indemR.aplica ? `Sal. diario sin auxilio: ${fmtCOP(salDiarioPuro)} · Días indem.: ${indemR.dias?.toFixed(2)||"n/a"} · Base: salario ordinario sin auxilio (Art. 128 CST)` : (indemR.nota||"—"),
        nota: base.aplica && indemR.aplica ? `Auxilio de transporte excluido de la base (Art. 64 y 128 CST · Ley 1/1963 Art. 7 no aplica a indemnización)` : indemR.nota,
        ref:"Art. 64 CST", v:indemR.v||0 }
    );
    if (diasSalPend>0) lineas.push(
      { key:"salarios_pend", aplica:true, concepto:"Salarios pendientes último período",
        formula:"Sal. diario × Días no pagados",
        vars:`Sal. diario: ${fmtCOP(salDiario)} · Días: ${diasSalPend}`,
        ref:"Art. 127 CST", v:salPend }
    );
    if (extras>0) lineas.push(
      { key:"extras", aplica:true, concepto:"Horas extra / recargos / comisiones pendientes",
        formula:"Valor declarado", vars:"Monto ingresado por el usuario",
        ref:"Art. 168 y 179 CST", v:extras }
    );
    const total = lineas.reduce((s,l)=>s+(l.aplica?l.v:0),0);
    return { errors:[], dias, diasCal, diasSem, diasCes, base, salDiario, lineas, total };
  }
</script>

<script id="alerts-js">
  function generarAlertas(d, calc) {
    const al = [];
    if (!calc || calc.errors?.length) return al;
    const emp = d.empresaConceptos;
    const tEmp = Object.values(emp||{}).reduce((s,v)=>s+(Number(v)||0),0);
    const tEmpOk = tEmp>0;

    if (d.motivoTerminacion==="despido_sin_justa" && tEmpOk && !(Number(emp.indemnizacion)>0) && !d.periodoPrueba)
      al.push({sev:"critical", tag:"Indemnización ausente", txt:"Despido sin justa causa sin indemnización en la propuesta de la empresa. Art. 64 CST establece una indemnización mínima obligatoria."});
    if (d.periodoPrueba)
      al.push({sev:"info", tag:"Periodo de prueba", txt:"Terminación en periodo de prueba (máx. 2 meses): no genera indemnización por despido (Art. 80 CST)."});
    if (d.fueroEspecial)
      al.push({sev:"critical", tag:"Fuero o estabilidad reforzada", txt:"El trabajador podría tener fuero (embarazo, lactancia, sindical, salud). La terminación puede requerir autorización previa del Ministerio de Trabajo. Consulte asesoría profesional antes de actuar."});
    const sumaSal = (d.conceptos||[]).filter(c=>c.salarial).reduce((s,c)=>s+(Number(c.monto)||0),0);
    const sumaNoSal = (d.conceptos||[]).filter(c=>!c.salarial).reduce((s,c)=>s+(Number(c.monto)||0),0);
    const totalPagos = (Number(d.tipoSalario==="fijo"?d.salarioFijo:d.tipoSalario==="integral"?d.salarioIntegral:d.promedioVariable)||0) + sumaSal + sumaNoSal;
    if (totalPagos>0 && sumaNoSal/totalPagos>0.40)
      al.push({sev:"warn", tag:"Art. 128 CST", txt:`Los pagos NO salariales representan el ${((sumaNoSal/totalPagos)*100).toFixed(1)}% del total. Si superan el 40%, hay riesgo de reclasificación jurisprudencial como salario.`});
    if (d.tipoSalario==="variable" && tEmpOk)
      al.push({sev:"warn", tag:"Salario variable", txt:"Verifique que la empresa usó el promedio del último año completo (Art. 132 CST), no el último valor pagado."});
    if (calc.base.aplica && tEmpOk) {
      const vacEmp = Number(emp.vacaciones||0);
      const vacNorma = calc.lineas.find(l=>l.key==="vacaciones")?.v||0;
      if (vacEmp>0 && vacNorma>0) {
        const r = vacEmp/vacNorma;
        if (r>1.05 && r<1.20)
          al.push({sev:"warn", tag:`${calc.base.tipoAux} en vacaciones`, txt:`Las vacaciones de la empresa son ${((r-1)*100).toFixed(1)}% superiores. El ${calc.base.tipoAux.toLowerCase()} NO se incluye en base de vacaciones (Art. 192 CST).`});
      }
      const cesEmp = Number(emp.cesantias||0);
      const cesNorma = calc.lineas.find(l=>l.key==="cesantias")?.v||0;
      if (cesEmp>0 && cesNorma>0) {
        const ratioBase = calc.base.baseSinAux/calc.base.baseConAux;
        const r2 = cesEmp/cesNorma;
        if (r2>ratioBase*0.96 && r2<ratioBase*1.04)
          al.push({sev:"warn", tag:`${calc.base.tipoAux} omitido en cesantías`, txt:`Las cesantías de la empresa sugieren que NO se incluyó el ${calc.base.tipoAux.toLowerCase()} en la base. Sí debe incluirse (Art. 7 Ley 1/1963).`});
      }
    }
    if (d.tipoSalario==="integral") {
      const si = Number(d.salarioIntegral||0);
      if (si < SALARIO_INTEGRAL_MIN)
        al.push({sev:"critical", tag:"Salario integral inválido", txt:`El salario integral (${fmtCOP(si)}) está por debajo del mínimo de 13 SMMLV (${fmtCOP(SALARIO_INTEGRAL_MIN)}). Revise la categoría salarial.`});
    }
    if (d.tipoContrato==="aprendizaje")
      al.push({sev:"warn", tag:"Contrato aprendizaje SENA", txt:"Régimen especial (Ley 789/2002). El aprendiz recibe un apoyo de sostenimiento, no salario. Las prestaciones del CST ordinario no aplican igual. Los resultados pueden no corresponder; consulte un especialista."});
    if (calc.base.aplica && d.modalidadLaboral==="teletrabajo")
      al.push({sev:"info", tag:"Teletrabajo · Ley 2466/2025", txt:"Se aplica auxilio de conectividad en lugar del de transporte para teletrabajadores con salario ≤ 2 SMMLV. Monto e inclusión en prestaciones son equivalentes."});
    if (d.modalidadLaboral==="hibrido")
      al.push({sev:"info", tag:"Modalidad híbrida", txt:"La reglamentación del auxilio de conectividad para trabajo híbrido está en desarrollo. Verifique qué auxilio aplica según el pacto laboral y la dedicación presencial."});
    // Prescripción
    const f2 = parseDate(d.fechaTerminacion);
    if (f2) {
      const elapsed = diasCalendario(f2, HOY);
      const TRES = 3*365;
      if (elapsed > TRES)
        al.push({sev:"critical", tag:"Posible prescripción", txt:`Han transcurrido ${Math.floor(elapsed/365)} años y ${Math.floor((elapsed%365)/30)} meses desde la terminación. Las acciones laborales prescriben a los 3 años (Art. 488 CST). Consulte asesoría jurídica urgentemente.`});
      else if (elapsed > TRES-90)
        al.push({sev:"critical", tag:"Prescripción próxima", txt:`Quedan aprox. ${Math.ceil((TRES-elapsed)/30)} mes(es) antes del vencimiento de las acciones laborales (Art. 488 CST). No demore en actuar.`});
    }
    return al;
  }
</script>

    if (next) next.addEventListener("click",()=>{ if(collectStep()){S.step++;save();renderWizard();} });
    const calc = document.getElementById("btn-calc");
    if (calc) calc.addEventListener("click",()=>{ if(collectStep()){S.step=6;save();renderResultado();goTo("resultado");} });
    wireStep();
  }

  function renderStep() {
    switch(S.step){
      case 1: return renderS1();
      case 2: return renderS2();
      case 3: return renderS3();
      case 4: return renderS4();
      case 5: return renderS5();
      default: return "";
    }
  }

  // ---- Wire step events ----
  function wireStep() {
    const s = S.step, d = S.datos;
    function bind(sel, fn) {
      const el = document.querySelector(sel);
      if (!el) return;
      el.addEventListener("input", e=>{fn(e.target.value); save();});
      el.addEventListener("change", e=>{fn(e.target.value); save();});
    }
    function bindCb(sel, fn) {
      const el = document.querySelector(sel);
      if (el) el.addEventListener("change", e=>{fn(e.target.checked); save();});
    }
    if (s===1) {
      bind(`select[name="tipoContrato"]`, v=>d.tipoContrato=v);
      bind(`select[name="motivoTerminacion"]`, v=>d.motivoTerminacion=v);
      bind(`input[name="fechaIngreso"]`, v=>{ d.fechaIngreso=v; refreshDatePreview(); });
      bind(`input[name="fechaTerminacion"]`, v=>{ d.fechaTerminacion=v; refreshDatePreview(); });
      bindCb(`input[name="periodoPrueba"]`, v=>d.periodoPrueba=v);
      bindCb(`input[name="fueroEspecial"]`, v=>d.fueroEspecial=v);
    }
    if (s===2) {
      bind(`select[name="tipoSalario"]`, v=>{ d.tipoSalario=v; save(); renderWizard(); });
      bind(`select[name="modalidadLaboral"]`, v=>d.modalidadLaboral=v);
      bind(`select[name="auxTransporteModo"]`, v=>d.auxTransporteModo=v);
      bind(`input[name="salarioFijo"]`, v=>d.salarioFijo=v);
      bind(`input[name="promedioVariable"]`, v=>d.promedioVariable=v);
      bind(`input[name="salarioIntegral"]`, v=>d.salarioIntegral=v);
      document.querySelectorAll(`input[name="modoVar"]`).forEach(r=>r.addEventListener("change", e=>{d.modoVariable=e.target.value; save(); renderWizard();}));
      for(let i=0;i<12;i++) bind(`input[name="m${i}"]`, v=>{ d.mensualidades[i]=v; refreshPromLive(); });
      refreshPromLive();
      const addBtn = document.getElementById("add-concepto");
      if (addBtn) addBtn.addEventListener("click", ()=>{
        d.conceptos.push({nombre:"",monto:"",salarial:true}); save(); renderWizard();
      });
      document.querySelectorAll("#conceptos-list .concept-row").forEach(row=>{
        const i=Number(row.dataset.idx);
        row.querySelector(`[data-cf="nombre"]`)?.addEventListener("input", e=>d.conceptos[i].nombre=e.target.value);
        row.querySelector(`[data-cf="monto"]`)?.addEventListener("input", e=>d.conceptos[i].monto=e.target.value);
        row.querySelector(`[data-cf="salarial"]`)?.addEventListener("change", e=>d.conceptos[i].salarial=e.target.checked);
        row.querySelector(`[data-rm]`)?.addEventListener("click", ()=>{ d.conceptos.splice(i,1); save(); renderWizard(); });
      });
    }
    if (s===3) {
      bind(`input[name="diasVacacionesDisfrutadas"]`, v=>{ d.diasVacacionesDisfrutadas=v; refreshVacPreview(); });
      bind(`input[name="diasVacacionesPendientesAnt"]`, v=>{ d.diasVacacionesPendientesAnt=v; refreshVacPreview(); });
    }
    if (s===4) {
      document.querySelectorAll(`input[name="cesAntCon"]`).forEach(r=>r.addEventListener("change", e=>{
        d.cesantiasAnterioresConsignadas=e.target.value; save(); renderWizard();
      }));
      document.querySelectorAll(`input[name="primaPag"]`).forEach(r=>r.addEventListener("change", e=>{ d.primaPagada=e.target.value; save(); }));
      bind(`input[name="cesantiasPendientesAnt"]`, v=>d.cesantiasPendientesAnt=v);
      bind(`input[name="primaPendiente"]`, v=>d.primaPendiente=v);
    }
    if (s===5) {
      bind(`input[name="diasSalPend"]`, v=>d.diasSalariosPendientes=v);
      bind(`input[name="extrasPend"]`, v=>d.extrasComisionesPend=v);
    }
  }

  function refreshDatePreview() {
    const d=S.datos;
    const dc=(d.fechaIngreso&&d.fechaTerminacion)?diasComerciales(d.fechaIngreso,d.fechaTerminacion):null;
    const dcc=(d.fechaIngreso&&d.fechaTerminacion)?diasCalendario(d.fechaIngreso,d.fechaTerminacion):null;
    const wrap=document.getElementById("time-preview");
    if (!wrap) return;
    const errEl=document.getElementById("err-fecha");
    const fi=parseDate(d.fechaIngreso), ff=parseDate(d.fechaTerminacion);
    if (fi&&ff&&ff<fi){ if(errEl) errEl.classList.add("visible"); wrap.style.display="none"; return; }
    if (errEl) errEl.classList.remove("visible");
    if (dc && dc>0) {
      wrap.style.display="";
      wrap.querySelectorAll(".lp-val").forEach((el,i)=>{
        if(i===0) el.textContent=dc;
        else if(i===1) el.textContent=dcc;
        else el.textContent=tiempoHumano(dc);
      });
    } else { wrap.style.display="none"; }
  }
  function refreshVacPreview() {
    const d=S.datos;
    const dc=(d.fechaIngreso&&d.fechaTerminacion)?diasComerciales(d.fechaIngreso,d.fechaTerminacion):0;
    const causados=(15*dc)/360;
    const netos=causados-Number(d.diasVacacionesDisfrutadas||0)+Number(d.diasVacacionesPendientesAnt||0);
    const el=document.getElementById("vac-netos");
    if(el) el.textContent=Math.max(0,netos).toFixed(2);
  }
  function refreshPromLive() {
    const d=S.datos;
    if(d.tipoSalario!=="variable"||d.modoVariable!=="mensual") return;
    const el=document.getElementById("prom-live"); if(!el) return;
    const filled=(d.mensualidades||[]).filter(m=>m!==""&&m!==null&&m!==undefined);
    if(!filled.length){el.textContent=""; return;}
    const prom=filled.reduce((a,m)=>a+(Number(m)||0),0)/filled.length;
    el.textContent=`Promedio (${filled.length} meses): ${fmtCOP(prom)} — Art. 132 CST`;
  }

  function collectStep() {
    const d=S.datos;
    if (S.step===1) {
      const fi=parseDate(d.fechaIngreso), ff=parseDate(d.fechaTerminacion);
      if(!fi||!ff){flashErr("Ingresa las fechas de ingreso y terminación.");return false;}
      if(ff<fi){flashErr("La fecha de terminación debe ser posterior a la de ingreso.");return false;}
    }
    if (S.step===2) {
      const sal=(() => {
        if(d.tipoSalario==="fijo") return Number(d.salarioFijo)||0;
        if(d.tipoSalario==="variable") return Number(d.promedioVariable)||0;
        return Number(d.salarioIntegral)||0;
      })();
      if(sal<=0){flashErr("Ingresa el valor del salario para continuar.");return false;}
    }
    save(); return true;
  }

  // ==============================================================
  // SCREEN: RESULTADO
  // ==============================================================
  const EMP_MAP=[
    {key:"cesantias",    normaKeys:["cesantias","cesantias_ant"], empF:"cesantias",    lbl:"Cesantías"},
    {key:"intereses",    normaKeys:["intereses"],                 empF:"intereses",    lbl:"Intereses cesantías"},
    {key:"prima",        normaKeys:["prima","prima_ant"],         empF:"prima",        lbl:"Prima de servicios"},
    {key:"vacaciones",   normaKeys:["vacaciones"],                empF:"vacaciones",   lbl:"Vacaciones"},
    {key:"indemnizacion",normaKeys:["indemnizacion"],             empF:"indemnizacion",lbl:"Indemnización"},
    {key:"salarios",     normaKeys:["salarios_pend"],             empF:"salarios",     lbl:"Salarios pendientes"},
    {key:"otros",        normaKeys:["extras"],                    empF:"otros",        lbl:"Horas extra / otros"},
  ];

  function renderResultado() {
    const el=document.getElementById("screen-resultado");
    const d=S.datos;
    const calc=calcularLiquidacion(d);
    if(calc.errors?.length){
      el.innerHTML=`<div class="resultado-wrap"><div class="card"><div class="card-body">
        <h2 style="margin-bottom:12px;">Datos incompletos</h2>
        <p class="text-muted">${escHtml(calc.errors[0])}</p>
        <button class="btn btn-primary mt-24" id="back-wiz">← Completar datos</button>
      </div></div></div>`;
      document.getElementById("back-wiz")?.addEventListener("click",()=>{ S.step=1; save(); renderWizard(); goTo("wizard"); });
      return;
    }
    const alertas=generarAlertas(d,calc);
    const tNorma=calc.total;
    const tEmp=Object.values(d.empresaConceptos||{}).reduce((s,v)=>s+(Number(v)||0),0);
    const tieneEmp=tEmp>0;
    const diff=tEmp-tNorma;
    const pctAbs=tNorma>0?Math.abs(diff/tNorma):0;
    const infoId=window._iid||(window._iid=uid());
    function band(r){
      if(r<=.01) return {code:"t",mark:"≤1%",title:"Dentro de tolerancia",body:"Diferencia por debajo del 1%. Atribuible a redondeos."};
      if(r<=.05) return {code:"p",mark:"1–5%",title:"Diferencia pequeña",body:"Entre 1% y 5%. Revisa los componentes antes de aceptar."};
      if(r<=.15) return {code:"s",mark:"5–15%",title:"Diferencia significativa",body:"Entre 5% y 15%. Se recomienda revisión detallada de cada concepto."};
      return {code:"a",mark:">15%",title:"Diferencia muy alta",body:"Supera el 15%. Revisa cuidadosamente antes de aceptar o pagar."};
    }
    const b=tieneEmp?band(pctAbs):null;
    const compRows=EMP_MAP.map(m=>{
      const norma=m.normaKeys.reduce((s,k)=>{const l=calc.lineas.find(x=>x.key===k);return s+(l&&l.aplica?l.v:0);},0);
      const emp=Number(d.empresaConceptos[m.empF]||0);
      const df=emp-norma;
      const pct=norma>0?df/norma:(emp>0?1:0);
      return {lbl:m.lbl,norma,emp,diff:df,pct,key:m.key};
    });
    el.innerHTML=`
    <div class="resultado-wrap">
      <!-- Disclaimer -->
      <div class="disclaimer mb-24">
        <strong>Liquia es informativa.</strong> No constituye asesoría jurídica. La exactitud depende de los datos ingresados. Ante dudas, consulte con un abogado laboralista o el Ministerio de Trabajo.
      </div>

      <!-- Ad Slot 4: Resultados Superior -->
      <div class="mb-24">${renderAd("ad-res-top")}</div>

      <div class="row-between mb-24">
        <div class="stack gap-4">
          <div class="row gap-8">
            ${S.rol?`<span class="pill">${t("label")}</span>`:''}
            <span class="pill">Liquidación según la ley</span>
            <span class="text-xs text-muted mono">${infoId}</span>
          </div>
          <h2 style="font-size:18px;">${t("resLead")} · ${fmtDate(HOY)}</h2>
        </div>
        <div class="row gap-8">
          <button class="btn btn-ghost" id="btn-edit">← Editar</button>
          <button class="btn btn-primary" id="btn-pdf">⬇ PDF</button>
        </div>
      </div>

      <!-- Total hero -->
      <div class="total-tile mb-24">
        <div class="total-label">${t("resTitle")}</div>
        <div class="total-amount">${fmtCOP(tNorma)}</div>
        <div class="total-meta">
          <span>📅 ${calc.dias} días comerciales</span>
          <span>⏱ ${tiempoHumano(calc.dias)}</span>
          <span>💰 Base: ${fmtCOP(calc.base.baseConAux)}</span>
        </div>
      </div>

      <!-- Summary tiles -->
      <div class="tiles-row mb-24">
        <div class="tile">
          <div class="tile-lbl">Salario mensual base</div>
          <div class="tile-val">${fmtCOP(calc.base.baseSinAux)}</div>
          <div class="tile-sub">${calc.base.aplica?calc.base.tipoAux+" incluido":"Sin auxilio"}</div>
        </div>
        <div class="tile">
          <div class="tile-lbl">Salario diario</div>
          <div class="tile-val">${fmtCOP(calc.salDiario)}</div>
          <div class="tile-sub">Base / 30 días</div>
        </div>
        <div class="tile">
          <div class="tile-lbl">Conceptos liquidados</div>
          <div class="tile-val">${calc.lineas.filter(l=>l.aplica).length}</div>
          <div class="tile-sub">Según ley aplicable</div>
        </div>
      </div>

      <!-- Breakdown -->
      <h3 style="margin-bottom:12px;">Desglose del cálculo</h3>
      <div class="breakdown-list mb-24">
        ${calc.lineas.map(l=>{
          const cls=!l.aplica?"bd-na":"";
          return `<div class="bd-row" data-key="${l.key}">
            <div class="bd-header">
              <span class="bd-name ${cls}">${escHtml(l.concepto)}${!l.aplica?" (no aplica)":""}</span>
              <div class="bd-right">
                <span class="bd-val mono">${l.aplica?fmtCOP(l.v):"—"}</span>
                <span class="bd-toggle">▶</span>
              </div>
            </div>
            <div class="bd-detail">
              <div class="bd-formula">${escHtml(l.formula)}</div>
              <div style="font-size:13px;color:var(--muted);">${escHtml(l.vars)}</div>
              ${l.nota?`<div class="bd-nota">${escHtml(l.nota)}</div>`:""}

        <div class="bd-row">
          <div class="bd-header" style="cursor:default;background:var(--brand-50);">
            <span class="bd-name fw-600" style="color:var(--brand);">Total según la ley</span>
            <span class="bd-val mono fw-700" style="color:var(--brand);font-size:17px;">${fmtCOP(tNorma)}</span>
          </div>
        </div>
      </div>

      <!-- Ad Slot 5: Resultados Central -->
      <div class="mb-24" style="max-width:336px;margin-left:auto;margin-right:auto;">${renderAd("ad-res-mid")}</div>

      <!-- Empresa comparison (optional, expandable) -->
      <div class="empresa-section mb-24">
        <div class="empresa-trigger" id="emp-trigger">

        </div>
        <div class="empresa-body" id="emp-body">
          <p class="text-sm text-muted mb-16">Ingresa los valores tal como aparecen en la propuesta de liquidación de la empresa. Deja en cero lo que no aplique.</p>
          <div class="empresa-fields" id="emp-fields">
            ${EMP_MAP.map(m=>`
            <div class="field">
              <div class="field-label">${escHtml(m.lbl)}</div>
              <input type="number" inputmode="decimal" min="0" name="emp_${m.empF}"
                value="${sanitizeNum(d.empresaConceptos[m.empF])||""}" placeholder="0"/>
            </div>`).join("")}
          </div>
          <div class="empresa-total mt-16">
            <div class="text-xs text-muted mono mb-4">Total propuesto por empresa</div>
            <div class="tile-val mono" id="emp-total-val">${tieneEmp?fmtCOP(tEmp):"$0"}</div>
          </div>
          ${tieneEmp?`
          <div id="emp-compare-section" style="margin-top:20px;">
            ${b?`<div class="band band-${b.code} mb-16"><div class="band-mark">${b.mark}</div><div><div class="band-title">${b.title}</div><div class="band-body">${b.body}</div></div></div>`:""}
            <div class="card" style="overflow:hidden;margin-top:14px;">
              <table class="data">
                <thead><tr><th>Concepto</th><th class="num">Norma</th><th class="num">Empresa</th><th class="num">Diferencia</th></tr></thead>
                <tbody>
                  ${compRows.map(r=>`<tr class="${r.diff<0?"neg":r.diff>0?"pos":""}">
                    <td>${escHtml(r.lbl)}</td>
                    <td class="num">${fmtCOP(r.norma)}</td>
                    <td class="num">${fmtCOP(r.emp)}</td>
                    <td class="num diff">${(r.diff>=0?"+":"")+fmtCOP(r.diff)}</td>
                  </tr>`).join("")}
                  <tr class="total">
                    <td>Total</td>
                    <td class="num">${fmtCOP(tNorma)}</td>
                    <td class="num">${fmtCOP(tEmp)}</td>
                    <td class="num ${diff<0?"neg":"pos"}">${(diff>=0?"+":"")+fmtCOP(diff)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>`:""}
        </div>
      </div>

      <!-- Alerts -->
      ${alertas.length?`
      <div class="mb-24">
        <h3 style="margin-bottom:12px;">Observaciones automáticas</h3>
        <div class="alert-list">
          ${alertas.map(a=>`<div class="alert-item ${a.sev}">
            <div class="alert-tag">${escHtml(a.tag)}</div>
            ${escHtml(a.txt)}
          </div>`).join("")}
        </div>
      </div>`:`
      <div class="mb-24"><div class="alert-item info">
        <div class="alert-tag">Sin observaciones</div>
        No se detectaron alertas automáticas en los datos ingresados.
      </div></div>`}

      <!-- Download CTA -->
      <div class="card mb-24">
        <div class="card-body" style="text-align:center;">
          <div style="font-size:28px;margin-bottom:10px;">📄</div>
          <h3 style="margin-bottom:8px;">Descarga el informe completo</h3>
          <p class="text-muted text-sm mb-20">PDF profesional con todas las fórmulas, referencias legales, tabla comparativa y recomendaciones.</p>
          <button class="btn btn-primary btn-lg" id="btn-pdf-main">⬇ Descargar informe PDF</button>
        </div>
      </div>

      <!-- Reset -->
      <div style="text-align:center;">
        <button class="btn btn-ghost" id="btn-reset">Nuevo cálculo</button>
      </div>
    </div>`;

    // Events
    document.getElementById("btn-edit")?.addEventListener("click",()=>{ S.step=1; save(); renderWizard(); goTo("wizard"); });
    [document.getElementById("btn-pdf"), document.getElementById("btn-pdf-main")].forEach(b=>b?.addEventListener("click",()=>generarPDF(calc,alertas,infoId)));
    document.getElementById("btn-reset")?.addEventListener("click",()=>{
      if(confirm("¿Borrar todos los datos y empezar un cálculo nuevo?")){ reset(); window._iid=null; renderLanding(); renderRol(); goTo("landing"); }
    });
    // Accordion
    document.querySelectorAll(".bd-header").forEach(h=>{
      if(h.style.cursor==="default") return;
      h.addEventListener("click",()=>h.closest(".bd-row")?.classList.toggle("open"));
    });
    // Empresa toggle
    document.getElementById("emp-trigger")?.addEventListener("click",()=>{
      const body=document.getElementById("emp-body");
      const arrow=document.getElementById("emp-arrow");
      if(!body) return;
      const open=body.classList.toggle("visible");
      if(arrow) arrow.textContent=open?"▲ Cerrar":"▼ Abrir";
    });
    // If already has empresa data, open it
    if(tieneEmp){
      document.getElementById("emp-body")?.classList.add("visible");
      const arr=document.getElementById("emp-arrow");
      if(arr) arr.textContent="▲ Cerrar";
    }
    // Empresa fields live update
    EMP_MAP.forEach(m=>{
      const inp=document.querySelector(`input[name="emp_${m.empF}"]`);
      if(inp) inp.addEventListener("input",e=>{ d.empresaConceptos[m.empF]=e.target.value; save(); refreshEmpTotal(); });
    });
    function refreshEmpTotal(){
      const t=Object.values(d.empresaConceptos).reduce((s,v)=>s+(Number(v)||0),0);
      const el=document.getElementById("emp-total-val"); if(el) el.textContent=fmtCOP(t);
    }
  }
</script>

<!-- ============================================================
     PDF GENERATION (Premium)
     ============================================================ -->
<script id="pdf-js">
  // Carga jsPDF bajo demanda (lazy) para no bloquear la carga inicial
  function cargarjsPDF() {
    return new Promise((resolve, reject) => {
      if (window.jspdf && window.jspdf.jsPDF) { resolve(); return; }
      const s1 = document.createElement('script');
      s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s1.onload = () => {
        const s2 = document.createElement('script');
        s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
        s2.onload = resolve;
        s2.onerror = () => reject(new Error('No se pudo cargar jsPDF-AutoTable'));
        document.head.appendChild(s2);
      };
      s1.onerror = () => reject(new Error('No se pudo cargar jsPDF. Verifique su conexión.'));
      document.head.appendChild(s1);
    });
  }

  async function generarPDF(calc, alertas, infoId) {
    // Mostrar indicador de carga
    const btnPdf = document.getElementById('btn-pdf');
    const btnPdfMain = document.getElementById('btn-pdf-main');
    const origText1 = btnPdf?.textContent, origText2 = btnPdfMain?.textContent;
    if (btnPdf) { btnPdf.textContent = 'Cargando PDF…'; btnPdf.disabled = true; }
    if (btnPdfMain) { btnPdfMain.textContent = 'Generando PDF…'; btnPdfMain.disabled = true; }

    try {
      await cargarjsPDF();
    } catch(e) {
      if (btnPdf) { btnPdf.textContent = origText1; btnPdf.disabled = false; }
      if (btnPdfMain) { btnPdfMain.textContent = origText2; btnPdfMain.disabled = false; }
      flashErr('No se pudo cargar el generador de PDF. Verifique su conexión a internet.');
      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:"portrait", unit:"pt", format:"a4" });
    const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
    const M=40, CW=W-2*M;
    const C = { brand:[12,58,94], brandMid:[30,92,142], accent:[196,127,23], text:[26,25,21],
                muted:[138,131,123], line:[224,219,212], green:[26,107,74], red:[155,28,28],
                bg:[246,244,240], white:[255,255,255] };
    let y=0, pageNum=0;

    const HDR_H = 58; // altura banda header

    // Función reutilizable — la llaman newPage() Y los hooks de autoTable
    function drawHeader() {
      doc.setFillColor(...C.brand);
      doc.rect(0,0,W,HDR_H,"F");

      // ── Columna izquierda (x desde M, max hasta mitad de página) ──
      doc.setFont("helvetica","bold");
      doc.setFontSize(15);
      doc.setTextColor(...C.white);
      doc.text("LIQUIA", M, 20);

      doc.setFont("helvetica","normal");
      doc.setFontSize(8);
      doc.setTextColor(190,215,238);
      doc.text("Calculadora de Liquidación Laboral en Colombia", M, 33);

      doc.setFontSize(7);
      doc.setTextColor(150,185,220);
      doc.text("CST + Ley 2466/2025 + Decreto 0159/2026", M, 44);

      // ── Columna derecha (x = W−M, alineado derecha) ──
      doc.setFont("helvetica","normal");
      doc.setFontSize(7.5);
      doc.setTextColor(200,225,242);
      doc.text(infoId, W-M, 20, {align:"right"});

      doc.setFontSize(7.5);
      doc.text(`Generado: ${fmtDate(HOY)}`, W-M, 31, {align:"right"});

      doc.setFontSize(7);
      doc.setTextColor(150,185,220);
      doc.text("No constituye asesoría jurídica · liquia.co", W-M, 44, {align:"right"});
    }

    function newPage() {
      if(pageNum>0) doc.addPage();
      pageNum++;
      drawHeader();
      y = HDR_H + 12;
    }

    function checkPage(need=80) { if(y+need>H-60) newPage(); }

    function sectionTitle(txt) {
      checkPage(30);
      doc.setFont("helvetica","bold");
      doc.setFontSize(10);
      doc.setTextColor(...C.brand);
      doc.text(txt,M,y); y+=4;
      doc.setDrawColor(...C.brandMid);
      doc.setLineWidth(1.5);
      doc.line(M,y,M+20,y); y+=12;
      doc.setTextColor(...C.text);
    }

    function footer(pgTotal) {
      for(let pageIdx=1;pageIdx<=pgTotal;pageIdx++){
        doc.setPage(pageIdx);
        const fY=H-28;
        doc.setDrawColor(...C.line);
        doc.setLineWidth(0.5);
        doc.line(M,fY-8,W-M,fY-8);
        doc.setFont("helvetica","normal");
        doc.setFontSize(7.5);
        doc.setTextColor(...C.muted);
        doc.text("Liquia es de uso informativo. No constituye asesoría jurídica. Consulte un especialista ante dudas. · liquia.co",M,fY);
        doc.text(`Pág. ${pageIdx} / ${pgTotal}`,W-M,fY,{align:"right"});
      }
    }

    const d=S.datos;
    newPage();

    // ── Datos generales ──────────────────────────────
    sectionTitle("1. Datos del contrato");
    const datosRows=[
      ["Tipo de contrato", labelContrato(d.tipoContrato)],
      ["Motivo de terminación", labelMotivo(d.motivoTerminacion)],
      ["Fecha de ingreso", fmtDate(d.fechaIngreso)],
      ["Fecha de terminación", fmtDate(d.fechaTerminacion)],
      ["Tiempo de servicio", tiempoHumano(calc.dias) + ` (${calc.dias} días comerciales · ${calc.diasCal} calendario)`],
      ["Tipo de salario", labelTipoSal(d.tipoSalario)],
      ["Modalidad laboral", labelMod(d.modalidadLaboral)],
      ["Salario mensual base", fmtCOP(calc.base.baseSinAux)],
      [`${calc.base.tipoAux}`, calc.base.aplica ? fmtCOP(calc.base.auxMensual)+" (aplica)" : "No aplica"],
      ["Base con auxilio (para prestaciones)", fmtCOP(calc.base.baseConAux)],
      ["Salario diario", fmtCOP(calc.salDiario)],
      ["Período de prueba", d.periodoPrueba?"Sí":"No"],
      ["Fuero o estabilidad reforzada", d.fueroEspecial?"Sí":"No"],
    ];
    doc.autoTable({startY:y, head:[["Campo","Valor"]], body:datosRows,
      theme:"grid", styles:{font:"helvetica",fontSize:8.5,cellPadding:5,lineColor:C.line,lineWidth:.3},
      headStyles:{fillColor:C.bg,textColor:C.text,fontStyle:"bold"},
      columnStyles:{0:{cellWidth:200},1:{halign:"left"}}, margin:{top:HDR_H+14, left:M, right:M},
      didAddPage: function(){drawHeader(); pageNum++;}});
    y=doc.lastAutoTable.finalY+20;

    // ── Liquidación según norma ──────────────────────
    checkPage(100);
    sectionTitle("2. Liquidación según la ley");

    // Total highlight box
    doc.setFillColor(...C.brand);
    doc.roundedRect(M,y,CW,44,4,4,"F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(10);
    doc.setTextColor(...C.white);
    doc.text("TOTAL LIQUIDACIÓN SEGÚN LA LEY",M+12,y+16);
    doc.setFont("helvetica","bold");
    doc.setFontSize(16);
    doc.text(fmtCOP(calc.total),W-M-12,y+28,{align:"right"});
    doc.setFont("helvetica","normal");
    doc.setFontSize(8);
    doc.setTextColor(180,210,240);
    doc.text(`${calc.lineas.filter(l=>l.aplica).length} conceptos · ${calc.dias} días`,M+12,y+32);
    y+=56;

    const normaBody=calc.lineas.filter(l=>l.aplica).map(l=>[
      // Col 0: nombre + referencia normativa
      {content:`${l.concepto}\n${l.ref}`, styles:{fontStyle:"bold", overflow:"linebreak"}},
      // Col 1: fórmula + variables + nota (separación con \n explícita evita fusión visual)
      {content:[l.formula, l.vars, l.nota||null].filter(Boolean).join("\n"),
       styles:{textColor:[100,95,90], fontSize:8, overflow:"linebreak"}},
      // Col 2: valor — prefijo \u200E (LTR mark) garantiza orden correcto en extracción PDF
      {content:"\u200E"+fmtCOP(l.v), styles:{halign:"right", fontStyle:"bold", overflow:"linebreak"}}
    ]);
    normaBody.push([
      {content:"TOTAL", styles:{fontStyle:"bold", fillColor:C.bg}},
      {content:"",      styles:{fillColor:C.bg}},
      {content:"\u200E"+fmtCOP(calc.total), styles:{fontStyle:"bold", halign:"right", fillColor:C.bg}}
    ]);
    doc.autoTable({
      startY:y,
      head:[["Concepto / Norma","Fórmula y variables","Valor"]],
      body:normaBody,
      theme:"grid",
      styles:{
        font:"helvetica", fontSize:8,
        cellPadding:{top:6, right:6, bottom:7, left:6},
        lineColor:C.line, lineWidth:.4,
        valign:"top", overflow:"linebreak",
        minCellHeight:28           // evita que celdas muy cortas colapsen con la siguiente
      },
      headStyles:{fillColor:C.bg, textColor:C.text, fontStyle:"bold", fontSize:8.5},
      columnStyles:{
        0:{cellWidth:138, overflow:"linebreak"},
        1:{cellWidth:245, overflow:"linebreak"},
        2:{cellWidth:90,  halign:"right", overflow:"linebreak"}
      },
      rowPageBreak:"avoid",        // intenta no cortar filas entre páginas
      margin:{top:HDR_H+14, left:M, right:M},
      didAddPage: function(){drawHeader(); pageNum++;}
    });
    y=doc.lastAutoTable.finalY+20;

    // ── Empresa ──────────────────────────────────────
    const tEmp=Object.values(d.empresaConceptos||{}).reduce((s,v)=>s+(Number(v)||0),0);
    const tieneEmp=tEmp>0;
    if(tieneEmp){
      checkPage(120);
      sectionTitle("3. Propuesta de la empresa");
      const diff=tEmp-calc.total;
      const empBody=EMP_MAP.map(m=>{
        const v=Number(d.empresaConceptos[m.empF]||0);
        return [m.lbl, v>0?fmtCOP(v):"—"];
      });
      empBody.push([{content:"TOTAL",styles:{fontStyle:"bold"}},{content:fmtCOP(tEmp),styles:{fontStyle:"bold",halign:"right"}}]);
      doc.autoTable({startY:y,head:[["Concepto","Valor empresa"]],body:empBody,
        theme:"grid",styles:{font:"helvetica",fontSize:9,cellPadding:5,lineColor:C.line,lineWidth:.3},
        headStyles:{fillColor:C.bg,textColor:C.text,fontStyle:"bold"},
        columnStyles:{0:{cellWidth:220},1:{halign:"right"}},margin:{top:HDR_H+14, left:M, right:M},
        didAddPage: function(){drawHeader(); pageNum++;}});
      y=doc.lastAutoTable.finalY+14;

      // Diff box
      doc.setFillColor(diff<0?250:240,diff<0?235:248,diff<0?235:244);
      doc.setDrawColor(...(diff<0?C.red:C.green));
      doc.roundedRect(M,y,CW,40,4,4,"FD");
      doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(...(diff<0?C.red:C.green));
      doc.text(diff<0?"Diferencia (empresa paga MENOS)":"Diferencia (empresa paga más / igual)",M+12,y+14);
      doc.setFontSize(14);
      doc.text((diff>=0?"+":"")+fmtCOP(diff),W-M-12,y+26,{align:"right"});
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(...C.muted);
      const pct=calc.total>0?Math.abs(diff/calc.total)*100:0;
      doc.text(`${pct.toFixed(1)}% de diferencia en valor absoluto`,M+12,y+28);
      y+=52;

      // Comparison table
      checkPage(100);
      const cmpBody=EMP_MAP.map(m=>{
        const norma=m.normaKeys.reduce((s,k)=>{const l=calc.lineas.find(x=>x.key===k);return s+(l&&l.aplica?l.v:0);},0);
        const emp=Number(d.empresaConceptos[m.empF]||0);
        const df=emp-norma;
        return [m.lbl,fmtCOP(norma),fmtCOP(emp),(df>=0?"+":"")+fmtCOP(df),
          norma===0&&emp===0?"—":((df>=0?"+":"")+(df/norma*100||0).toFixed(1)+"%")];
      });
      cmpBody.push([{content:"TOTAL",styles:{fontStyle:"bold"}},{content:fmtCOP(calc.total),styles:{fontStyle:"bold",halign:"right"}},
        {content:fmtCOP(tEmp),styles:{fontStyle:"bold",halign:"right"}},
        {content:(diff>=0?"+":"")+fmtCOP(diff),styles:{fontStyle:"bold",halign:"right"}},
        {content:calc.total>0?((diff/calc.total)*100).toFixed(2)+"%":"—",styles:{fontStyle:"bold",halign:"right"}}]);
      doc.autoTable({startY:y,head:[["Concepto","Norma","Empresa","Diferencia","Δ %"]],body:cmpBody,
        theme:"grid",styles:{font:"helvetica",fontSize:8.5,cellPadding:4,lineColor:C.line,lineWidth:.3},
        headStyles:{fillColor:C.bg,textColor:C.text,fontStyle:"bold"},
        columnStyles:{0:{cellWidth:130},1:{halign:"right"},2:{halign:"right"},3:{halign:"right"},4:{halign:"right"}},
        margin:{top:HDR_H+14, left:M, right:M}, didAddPage: function(){drawHeader(); pageNum++;}});
      y=doc.lastAutoTable.finalY+20;
    }

    // ── Alertas ──────────────────────────────────────
    const secN = tieneEmp?"4":"3";
    checkPage(60);
    sectionTitle(`${secN}. Observaciones técnicas`);
    if(!alertas.length){
      doc.setFont("helvetica","italic"); doc.setFontSize(9); doc.setTextColor(...C.muted);
      doc.text("No se detectaron observaciones automáticas.",M,y); y+=18;
    } else {
      const obsBody=alertas.map(a=>[
        a.sev==="critical"?"CRÍTICO":a.sev==="info"?"INFO":"ADVERTENCIA",
        a.tag, a.txt
      ]);
      doc.autoTable({startY:y,head:[["Nivel","Categoría","Detalle"]],body:obsBody,
        theme:"grid",styles:{font:"helvetica",fontSize:8,cellPadding:4,lineColor:C.line,lineWidth:.3,valign:"top"},
        headStyles:{fillColor:C.bg,textColor:C.text,fontStyle:"bold"},
        columnStyles:{0:{cellWidth:55},1:{cellWidth:100}},margin:{top:HDR_H+14, left:M, right:M},
        didAddPage: function(){drawHeader(); pageNum++;}});
      y=doc.lastAutoTable.finalY+20;
    }

    // ── Recomendaciones ──────────────────────────────
    const secM = tieneEmp?"5":"4";
    checkPage(80);
    sectionTitle(`${secM}. Recomendaciones de acción`);
    const recos=[
      "Solicite el desglose por escrito al empleador. Cada concepto debe poder explicarse con su fórmula, base salarial y artículo del CST.",
      "Conserve el contrato firmado, los desprendibles de nómina de los últimos 12 meses y toda comunicación sobre la terminación.",
      "Si la diferencia supera el 5%, considere consultar a un abogado laboralista o acudir al Ministerio de Trabajo antes de firmar.",
      "Las acciones laborales prescriben a los 3 años contados desde la exigibilidad (Art. 488 CST). No deje pasar tiempo si hay diferencias.",
      "Ministerio de Trabajo Colombia: www.mintrabajo.gov.co · Línea gratuita: 01 8000 11 3380 · Generado con Liquia (liquia.co)",
    ];
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(...C.text);
    recos.forEach((r,i)=>{
      checkPage(28);
      const t=doc.splitTextToSize(`${i+1}. ${r}`, CW-16);
      doc.text(t,M+8,y); y+=t.length*12+5;
    });

    footer(doc.internal.getNumberOfPages());
    doc.save(`liquia_liquidacion_${infoId}.pdf`);

    // Restaurar botones
    if (btnPdf) { btnPdf.textContent = origText1; btnPdf.disabled = false; }
    if (btnPdfMain) { btnPdfMain.textContent = origText2; btnPdfMain.disabled = false; }
  }

  function labelContrato(c){return({indefinido:"Término indefinido",fijo:"Término fijo",obra:"Obra o labor",aprendizaje:"Aprendizaje SENA",domestico:"Servicio doméstico"})[c]||c;}
  function labelMotivo(m){return({renuncia:"Renuncia voluntaria",despido_sin_justa:"Despido sin justa causa",despido_con_justa:"Despido con justa causa",mutuo:"Mutuo acuerdo",vencimiento:"Vencimiento del término",obra_terminada:"Terminación de la obra",muerte:"Muerte del trabajador",abandono:"Abandono del cargo"})[m]||m;}
  function labelTipoSal(t){return({fijo:"Ordinario fijo",variable:"Ordinario variable",integral:"Integral"})[t]||t;}
  function labelMod(m){return({presencial:"Presencial",teletrabajo:"Teletrabajo",hibrido:"Híbrido"})[m]||m;}

</script>
